<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assignment4.css">
    <script src="/js/house.js" type="module"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

</head>

<body>

    <section id="container"></section>
    <main>
        <div id="error-container"></div>
        <div id="house-details"></div>
        <h2>Var ligger huset?</h2>
        <div id="map"></div>
    </main>

    <section id="booking-section">
        <h2>Boka ditt boende</h2>
        <form id="booking-form">

            <label for="book-date">Incheckning</label>
            <input type="date" id="book-date" required>

            <label for="book-days" id="book-days">Antal nätter:</label>
            <input type="number" id="book-days" min="1" value="1" required>

            <fieldset>
                <legend>Frivilliga tillägg</legend>
                <label>
                    <input type="checkbox" class="addon-checkbox" value="100"> Frukost: 100 kr
                </label><br>
                <label>
                    <input type="checkbox" class="addon-checkbox" value="300"> Vandring 350 kr
                </label><br>
                <label>
                    <input type="checkbox" class="addon-checkbox" value="500"> Nattlig Seans 800 kr
                </label>
            </fieldset>

            <label for="book-code">Kampanjkod (SPOOK20 för 20% av)</label>
            <input type="text" id="book-code" placeholder="SPOOK20">

            <div class="price">
                Totalsumma: <em id="total-price">0</em> Kr
            </div>

            <div id="book-error" class="error-text"></div>

            <button type="submit" class="submit">Slutför din bokning</button>
        </form>
        <div id="confirmation"></div>
    </section>
</body>

</html>
